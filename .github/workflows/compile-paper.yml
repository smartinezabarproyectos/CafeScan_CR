name: Compile LaTeX Paper

on:
  push:
    paths:
      - 'paper/cafescan_paper.tex'
      - 'paper/references.bib'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cafescan_paper.tex
          working_directory: paper
          latexmk_use_xelatex: false
          extra_system_packages: "bibtex"

      - name: Move PDF and clean source
        run: |
          mkdir -p paper/out
          mv paper/cafescan_paper.pdf paper/cafescan_paper.pdf || true

      - name: Commit PDF to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper/cafescan_paper.pdf
          git diff --cached --quiet || git commit -m "ci: compile LaTeX paper to PDF"
          git push
